<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>git-tree</title>
<style>
  :root {
    --bg: #07090d;
    --bg-soft: #0b0e14;
    --panel: #0c1019;
    --panel-soft: #0f1420;
    --border: #1c2533;
    --border-soft: #161d28;
    --text: #e6edf3;
    --text-mid: #aeb9c6;
    --text-dim: #6e7b8a;
    --main: #2f81f7;
    --main-glow: #58a6ff;
    --gold: #ffd54a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background:
      radial-gradient(1200px 600px at 78% -10%, rgba(47,129,247,.07), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
  }
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #1d2738; border-radius: 6px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: #2a3852; }

  #app { display: flex; flex-direction: column; height: 100vh; }

  /* ---------- header ---------- */
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(20,28,42,.9), rgba(8,11,16,.9));
    backdrop-filter: blur(6px);
    flex: 0 0 auto; z-index: 5;
  }
  header .brand {
    display: flex; align-items: center; gap: 9px;
    font-weight: 700; font-size: 17px; letter-spacing: .3px; color: #fff;
  }
  header .brand .logo {
    width: 11px; height: 11px; border-radius: 50%;
    background: var(--main-glow);
    box-shadow: 0 0 10px var(--main-glow), 0 0 22px rgba(88,166,255,.5);
  }
  header .brand .accent { color: var(--main-glow); }
  .search-wrap { position: relative; flex: 0 0 360px; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; opacity: .55; }
  #search {
    width: 100%; background: rgba(5,7,11,.85); border: 1px solid var(--border);
    color: var(--text); padding: 9px 14px 9px 36px; border-radius: 10px; font-size: 14px;
    outline: none; transition: border-color .15s, box-shadow .15s, background .15s;
  }
  #search::placeholder { color: var(--text-dim); }
  #search:focus { border-color: var(--main); background: #05070b; box-shadow: 0 0 0 3px rgba(47,129,247,.22); }
  #banner {
    display: none; font-size: 12.5px; color: #ffce8a; align-items: center; gap: 6px;
    background: rgba(255,158,0,.08); border: 1px solid rgba(255,158,0,.28);
    padding: 6px 12px; border-radius: 8px;
  }
  .meta-note {
    margin-left: auto; font-size: 12.5px; color: var(--text-dim);
    display: flex; align-items: center; gap: 8px;
  }
  .meta-note .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--main-glow); box-shadow: 0 0 8px var(--main-glow); }

  #main { display: flex; flex: 1 1 auto; min-height: 0; }
  #graph-wrap { flex: 1 1 auto; overflow: auto; position: relative; }
  #graph { display: block; }

  /* ---------- svg rows ---------- */
  .row-bg { fill: transparent; transition: fill .08s; }
  .row-bg.even { fill: rgba(255,255,255,.012); }
  .row-bg.hover { fill: rgba(255,255,255,.045); }
  .row-bg.selected { fill: rgba(88,166,255,.11); }
  .row-accent { opacity: 0; transition: opacity .1s; }
  .row-accent.on { opacity: 1; }
  .row { transition: opacity .12s; }
  .row.dim { opacity: .16; }
  .row-hit { cursor: pointer; }
  .subj { fill: var(--text); font-size: 13.5px; }
  .subj-merge { fill: var(--text-mid); font-style: italic; }
  .meta-author { fill: var(--text-mid); font-size: 12px; }
  .meta-time { fill: var(--text-dim); font-size: 11.5px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  text { user-select: none; }
  .pill-text { font-size: 11.5px; font-weight: 700; letter-spacing: .2px; }
  .tag-text { font-size: 11.5px; font-weight: 700; fill: var(--gold); letter-spacing: .2px; }
  .edge { fill: none; stroke-width: 2.2; }
  @keyframes headpulse { 0%,100% { stroke-opacity: 1; } 50% { stroke-opacity: .3; } }
  .head-outline { animation: headpulse 1.8s ease-in-out infinite; }

  /* ---------- side panel ---------- */
  #panel {
    flex: 0 0 372px; border-left: 1px solid var(--border);
    background: linear-gradient(180deg, var(--panel-soft), var(--panel));
    overflow-y: auto;
  }
  #panel.empty .panel-body { display: none; }
  #panel:not(.empty) .placeholder { display: none; }
  .placeholder {
    height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 40px; color: var(--text-dim); gap: 10px;
  }
  .placeholder .ph-icon {
    width: 58px; height: 58px; border-radius: 16px; display: flex; align-items: center; justify-content: center;
    background: rgba(88,166,255,.08); border: 1px solid rgba(88,166,255,.22);
    box-shadow: inset 0 0 24px rgba(88,166,255,.08);
    margin-bottom: 4px;
  }
  .placeholder .ph-title { font-size: 15px; color: var(--text-mid); font-weight: 600; }
  .placeholder .ph-sub { font-size: 12.5px; line-height: 1.6; max-width: 230px; }

  .panel-body { display: flex; flex-direction: column; }
  .p-head {
    position: relative; padding: 20px 22px 18px;
    border-bottom: 1px solid var(--border-soft);
  }
  .p-accent {
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .p-author { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .p-avatar {
    width: 40px; height: 40px; border-radius: 11px; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: #06080c; letter-spacing: .5px;
  }
  .p-name { font-weight: 600; font-size: 14px; color: var(--text); }
  .p-when { font-size: 12px; color: var(--text-dim); margin-top: 2px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .p-subject { font-size: 16.5px; font-weight: 600; line-height: 1.4; color: #fff; word-break: break-word; }
  .p-pills { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 14px; }

  .p-section { padding: 16px 22px; border-bottom: 1px solid var(--border-soft); }
  .p-section:last-child { border-bottom: none; }
  .p-label {
    color: var(--text-dim); text-transform: uppercase; letter-spacing: .8px;
    font-size: 10.5px; font-weight: 700; margin-bottom: 9px;
  }
  .p-bodytext {
    white-space: pre-wrap; line-height: 1.6; color: var(--text-mid); font-size: 13px;
    background: rgba(0,0,0,.28); border: 1px solid var(--border-soft);
    border-radius: 10px; padding: 12px 14px;
  }
  .p-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 18px; }
  .p-grid .full { grid-column: 1 / -1; }
  .p-value { color: var(--text); font-size: 13px; }
  .chip {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px;
    background: rgba(0,0,0,.35); border: 1px solid var(--border);
    padding: 5px 10px; border-radius: 8px; display: inline-flex; align-items: center; gap: 6px;
    transition: border-color .15s, color .15s, background .15s;
  }
  .chip.copyable { cursor: pointer; }
  .chip.copyable:hover { border-color: var(--main); color: var(--main-glow); }
  .chip.copied { border-color: #39ff14; color: #39ff14; }
  .chip.parent { cursor: pointer; }
  .chip.parent:hover { border-color: var(--main-glow); color: var(--main-glow); background: rgba(88,166,255,.08); }
  .parents-row { display: flex; flex-wrap: wrap; gap: 7px; }

  /* ---------- tooltip ---------- */
  #tooltip {
    position: fixed; pointer-events: none; z-index: 20; display: none;
    background: rgba(8,11,17,.97); border: 1px solid var(--border); border-radius: 8px;
    padding: 7px 11px; font-size: 12.5px; max-width: 420px; color: var(--text);
    box-shadow: 0 8px 30px rgba(0,0,0,.7);
  }
  #tooltip .t-sha { font-family: ui-monospace, monospace; color: var(--main-glow); margin-right: 8px; }
</style>

<div id="app">
  <header>
    <span class="brand"><span class="logo"></span>git&#8203;<span class="accent">tree</span></span>
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
      <input id="search" type="text" placeholder="Search message, author, or SHA&#8230;" autocomplete="off" spellcheck="false">
    </div>
    <span id="banner"></span>
    <span class="meta-note" id="meta-note"></span>
  </header>
  <div id="main">
    <div id="graph-wrap"><svg id="graph"></svg></div>
    <aside id="panel" class="empty">
      <div class="placeholder">
        <div class="ph-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3.2"></circle><line x1="12" y1="3" x2="12" y2="8.8"></line><line x1="12" y1="15.2" x2="12" y2="21"></line></svg>
        </div>
        <div class="ph-title">Select a commit</div>
        <div class="ph-sub">Click any row to inspect its message, copy its SHA, and trace its parents.</div>
      </div>
      <div class="panel-body"></div>
    </aside>
  </div>
</div>
<div id="tooltip"></div>

<script>

  function b64ToUtf8(b64) {
    if (!b64) return "";

    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return new TextDecoder("utf-8").decode(bytes);

  function splitRecords(s) {
    return s.split(RS).map(function (r) { return r.replace(/^\n+/, ""); })
            .filter(function (r) { return r.trim().length > 0; });

  // commits: SHA, parents(space-sep), author, isoDate, subject, body
  var commits = splitRecords(b64ToUtf8(RAW_COMMITS_B64)).map(function (rec) {
    var f = rec.split(US);

      sha: f[0],
      parents: (f[1] || "").trim().length ? f[1].trim().split(/\s+/) : [],

    .map(function (line) {

  // ---- classify refs ----
  var localBranches = [];   // {short, oid}
  var remoteBranches = {};  // short(no remote prefix) -> oid  (track origin/* divergence)
  var remoteList = [];      // {short, oid}
  var tags = [];            // {short, oid}

    }

  var PALETTE = ["#ff2e88","#00f0ff","#b026ff","#39ff14","#ff9e00","#ff5e5b","#14e0ff","#f7d51d","#ff6ec7"];

  function hashStr(s) { var h = 2166136261; for (var i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = (h * 16777619) >>> 0; } return h >>> 0; }

  // ---- determine default branch + tip priority order ----
  // Two distinct notions, both chosen independently of the current HEAD so
  // colors stay consistent across checkouts:

  //                 a local main/master). Only this branch earns electric blue.
  //                 If the repo has no real default, blueName is null and EVERY

  // ---- group owners, compute row span + bottom (oldest) commit ----
  var owners = {};
  commits.forEach(function (c) {
    var o = owners[c.owner] || (owners[c.owner] = { id: c.owner, color: c.color, min: c.row, max: c.row, bottom: c, isDefault: false });

    pushRef(b.oid, { kind: "branch", name: b.short, color: (b.short === blueName) ? MAIN : colorForBranch(b.short), isHead: b.short === headBranch });

  // origin/* divergence: render remote pill only when it differs from local counterpart

  remoteList.forEach(function (r) {

  //  Render

  var gRows = svg.append("g");

  gBg.selectAll("rect.row-bg").data(commits).enter().append("rect")
    .attr("class", function (c) { return "row-bg" + (c.row % 2 ? "" : " even"); })
    .attr("x", 0).attr("y", function (c) { return cy(c) - ROWH / 2; })
    .attr("width", svgWidth).attr("height", ROWH)
    .each(function (c) { c._bg = this; });
  gBg.selectAll("rect.row-accent").data(commits).enter().append("rect")
    .attr("class", "row-accent")
    .attr("x", 0).attr("y", function (c) { return cy(c) - ROWH / 2; })
    .attr("width", 3).attr("height", ROWH)
    .attr("fill", function (c) { return c.color; })
    .each(function (c) { c._accent = this; });

  // ---- edges ----
  var edgeData = [];
  commits.forEach(function (c) {
    c.parents.forEach(function (p) {
      var pc = byId[p];
      if (!pc) return;
      edgeData.push({ from: c, to: pc, color: c.color });
    });
  });
  function edgePath(d) {
    var x1 = cx(d.from), y1 = cy(d.from), x2 = cx(d.to), y2 = cy(d.to);
    if (x1 === x2) return "M" + x1 + "," + y1 + "L" + x2 + "," + y2;
    var my = (y1 + y2) / 2;
    return "M" + x1 + "," + y1 + "C" + x1 + "," + my + " " + x2 + "," + my + " " + x2 + "," + y2;
  }
  var edgeSel = gEdges.selectAll("path").data(edgeData).enter().append("path")
    .attr("class", "edge").attr("d", edgePath)
    .attr("stroke", function (d) { return d.color; })
    .attr("stroke-opacity", 0.85);

  // ---- rows (node + inline subject + pills + meta) ----
  var tooltip = document.getElementById("tooltip");
  var rowG = gRows.selectAll("g.row").data(commits).enter().append("g")
    .attr("class", "row")
    .attr("transform", function (c) { return "translate(0," + cy(c) + ")"; })
    .each(function (c) { c._row = this; });

  rowG.append("rect").attr("class", "row-hit")
    .attr("x", 0).attr("y", -ROWH / 2).attr("width", svgWidth).attr("height", ROWH)
    .attr("fill", "transparent");

  rowG
    .on("mouseenter", function (ev, c) {
      c._bg.classList.add("hover");
      tooltip.style.display = "block";
      tooltip.innerHTML = '<span class="t-sha">' + c.sha.slice(0, 7) + "</span>" + escapeHtml(c.subject);
    })
    .on("mousemove", function (ev) {
      tooltip.style.left = (ev.clientX + 14) + "px";
      tooltip.style.top = (ev.clientY + 14) + "px";
    })
    .on("mouseleave", function (ev, c) { c._bg.classList.remove("hover"); tooltip.style.display = "none"; })
    .on("click", function (ev, c) { selectCommit(c); });

  // merge: outer glowing ring
  rowG.filter(function (c) { return c.parents.length >= 2; }).append("circle")
    .attr("cx", function (c) { return cx(c); }).attr("cy", 0)
    .attr("r", RMERGE + 5).attr("fill", "none")
    .attr("stroke", function (c) { return c.color; }).attr("stroke-width", 1.6)
    .attr("stroke-opacity", 0.55).attr("filter", "url(#glow)");

  rowG.append("circle")
    .attr("cx", function (c) { return cx(c); }).attr("cy", 0)
    .attr("r", function (c) { return c.parents.length >= 2 ? RMERGE : R; })
    .attr("fill", function (c) { return c.color; })
    .attr("filter", "url(#glow)");
  rowG.append("circle")
    .attr("cx", function (c) { return cx(c); }).attr("cy", 0)
    .attr("r", function (c) { return (c.parents.length >= 2 ? RMERGE : R) - 2.5; })
    .attr("fill", "#06080c").attr("fill-opacity", 0.55);

  // inline subject — sized so subject + trailing pills never reach the author/time column
  rowG.append("text")
    .attr("class", function (c) { return "subj" + (c.parents.length >= 2 ? " subj-merge" : ""); })
    .attr("x", contentX).attr("y", 4.5)
    .text(function (c) { return c.subject || "(no message)"; })
    .each(function (c) {
      var avail = (CONTENT_END - contentX) - (c._pillsW ? c._pillsW + 14 : 0);
      truncateText(this, Math.max(90, avail));
      c._subjW = this.getComputedTextLength();
    });

  // trailing branch/tag pills (attached just after the subject)
  rowG.filter(function (c) { return c.refs.length; }).each(function (c) {
    var g = d3.select(this).append("g")
      .attr("transform", "translate(" + (contentX + c._subjW + 14) + ",0)");
    var offset = 0;
    var refs = c.refs.slice().sort(function (a, b) {
      if (a.isHead !== b.isHead) return a.isHead ? -1 : 1;
      var order = { branch: 0, remote: 1, tag: 2 };
      return order[a.kind] - order[b.kind];
    });
    refs.forEach(function (ref) {
      var isTag = ref.kind === "tag";
      var txt = ref.name;
      var w = txt.length * 6.9 + (isTag ? 28 : 22);
      var pg = g.append("g").attr("transform", "translate(" + offset + ",0)");
      if (isTag) {
        pg.append("path")
          .attr("d", "M9,-9 L" + (w - 4) + ",-9 L" + (w - 4) + ",9 L9,9 L0,0 Z")
          .attr("fill", "rgba(255,213,74,.13)").attr("stroke", "#ffd54a").attr("stroke-width", 1.2);
        pg.append("circle").attr("cx", 8).attr("cy", 0).attr("r", 2).attr("fill", "#ffd54a");
        pg.append("text").attr("x", 17).attr("y", 4).attr("class", "tag-text").text(txt);
      } else {
        pg.append("rect").attr("x", 0).attr("y", -10).attr("width", w).attr("height", 20)
          .attr("rx", 10).attr("fill", hexA(ref.color, 0.16))
          .attr("stroke", ref.color).attr("stroke-width", 1.3);
        if (ref.isHead) {
          pg.append("rect").attr("x", -2).attr("y", -12).attr("width", w + 4).attr("height", 24)
            .attr("rx", 12).attr("fill", "none").attr("stroke", "#ffffff").attr("stroke-width", 1.4)
            .attr("class", "head-outline").attr("filter", "url(#glow)");
        }
        pg.append("text").attr("x", 10).attr("y", 4).attr("class", "pill-text")
          .attr("fill", ref.color).text(txt);
      }
      offset += w + 8;
    });
  });

  // right-aligned author + relative time (x set by layout())
  var metaSel = rowG.append("text").attr("class", "meta-author")
    .attr("x", CONTENT_END + META_GAP).attr("y", 4.5).attr("text-anchor", "end")
    .text(function (c) { return truncStr(c.author, 22) + "   " + relTime(c.iso); });

  // stretch the content to fill the viewport: meta pins to the right edge and the row
  // backgrounds span the full width, so wide screens read as full-width list rows
  // instead of leaving a dead gap on the right.
  var hitSel = gRows.selectAll("rect.row-hit");
  var bgSel = gBg.selectAll("rect.row-bg");
  function layout() {
    var vw = document.getElementById("graph-wrap").clientWidth;
    var metaX = Math.max(CONTENT_END + META_GAP, vw - 26);
    var w = Math.max(metaX + 24, graphWidth + 40);
    svg.attr("width", w);
    bgSel.attr("width", w);
    hitSel.attr("width", w);
    metaSel.attr("x", metaX);
  }
  layout();
  window.addEventListener("resize", layout);

  // =====================================================================
  //  Selection + side panel
  // =====================================================================
  var panel = document.getElementById("panel");
  var graphWrap = document.getElementById("graph-wrap");
  var selected = null;

  function selectCommit(c) {
    if (selected && selected !== c) {
      selected._bg.classList.remove("selected");
      selected._accent.classList.remove("on");
    }
    selected = c;
    c._bg.classList.add("selected");
    c._accent.classList.add("on");
    showPanel(c);
  }
  function scrollToCommit(c) {
    var top = cy(c) - graphWrap.clientHeight / 2;
    graphWrap.scrollTo({ top: Math.max(0, top), behavior: "smooth" });
  }

  function fmtDate(iso) {
    if (!iso) return "";
    var d = new Date(iso); if (isNaN(d)) return iso;
    function p(n) { return (n < 10 ? "0" : "") + n; }
    return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate()) + " " + p(d.getHours()) + ":" + p(d.getMinutes());
  }
  function relTime(iso) {
    var d = new Date(iso); if (isNaN(d)) return "";
    var s = (Date.now() - d.getTime()) / 1000;
    if (s < 45) return "just now";
    var m = s / 60; if (m < 60) return Math.floor(m) + "m ago";
    var h = m / 60; if (h < 24) return Math.floor(h) + "h ago";
    var dy = h / 24; if (dy < 30) return Math.floor(dy) + "d ago";
    var mo = dy / 30; if (mo < 12) return Math.floor(mo) + "mo ago";
    return Math.floor(mo / 12) + "y ago";
  }
  function initials(name) {
    var parts = (name || "").trim().split(/\s+/);
    var a = (parts[0] || "")[0] || "";
    var b = parts.length > 1 ? (parts[parts.length - 1][0] || "") : "";
    return (a + b).toUpperCase() || "?";
  }

  function showPanel(c) {
    panel.classList.remove("empty");
    var color = c.color || MAIN;
    var pillsHtml = c.refs.map(function (ref) {
      if (ref.kind === "tag") return '<span class="ref-pill" style="border-color:#ffd54a;color:#ffd54a;background:rgba(255,213,74,.12)">' + escapeHtml(ref.name) + "</span>";
      return '<span class="ref-pill" style="border-color:' + ref.color + ';color:' + ref.color + ';background:' + hexA(ref.color, 0.14) + '">' + escapeHtml(ref.name) + "</span>";
    }).join("");

    var parentsHtml = c.parents.length
      ? c.parents.map(function (p) {
          var known = byId[p];
          return '<span class="chip parent" data-sha="' + p + '"' + (known ? "" : ' style="cursor:default;opacity:.6"') + '>' + escapeHtml(p.slice(0, 7)) + "</span>";
        }).join("")
      : '<span class="p-value" style="color:var(--text-dim)">root commit</span>';

    var body = panel.querySelector(".panel-body");
    body.innerHTML =
      '<div class="p-head">' +
        '<div class="p-accent" style="background:' + color + ';box-shadow:0 0 14px ' + hexA(color, 0.7) + '"></div>' +
        '<div class="p-author">' +
          '<div class="p-avatar" style="background:' + color + ';box-shadow:0 0 16px ' + hexA(color, 0.45) + '">' + escapeHtml(initials(c.author)) + "</div>" +
          '<div><div class="p-name">' + escapeHtml(c.author || "Unknown") + '</div>' +
          '<div class="p-when">' + escapeHtml(relTime(c.iso)) + '  ·  ' + escapeHtml(fmtDate(c.iso)) + "</div></div>" +
        "</div>" +
        '<div class="p-subject">' + escapeHtml(c.subject || "(no message)") + "</div>" +
        (pillsHtml ? '<div class="p-pills">' + pillsHtml + "</div>" : "") +
      "</div>" +
      (c.body ? '<div class="p-section"><div class="p-label">Description</div><div class="p-bodytext">' + escapeHtml(c.body) + "</div></div>" : "") +
      '<div class="p-section"><div class="p-grid">' +
        '<div class="full"><div class="p-label">Commit</div><span class="chip copyable" id="sha-copy">' +
          '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"></rect><path d="M5 15V5a2 2 0 0 1 2-2h10"></path></svg>' +
          escapeHtml(c.sha.slice(0, 10)) + "</span></div>" +
        '<div class="full"><div class="p-label">Parents</div><div class="parents-row">' + parentsHtml + "</div></div>" +
      "</div></div>";

    // inject ref-pill style once
    if (!document.getElementById("ref-pill-style")) {
      var st = document.createElement("style"); st.id = "ref-pill-style";
      st.textContent = ".ref-pill{display:inline-block;padding:3px 10px;border-radius:999px;border:1px solid;font-size:11.5px;font-weight:700;letter-spacing:.2px}";
      document.head.appendChild(st);
    }

    var shaEl = document.getElementById("sha-copy");
    shaEl.addEventListener("click", function () {
      var full = c.sha;
      (navigator.clipboard ? navigator.clipboard.writeText(full) : Promise.reject()).then(go, function () {
        var ta = document.createElement("textarea"); ta.value = full; document.body.appendChild(ta); ta.select();
        try { document.execCommand("copy"); } catch (e) {} document.body.removeChild(ta); go();
      });
      function go() {
        shaEl.classList.add("copied");
        var prev = shaEl.innerHTML;
        shaEl.textContent = "copied ✓";
        setTimeout(function () { shaEl.classList.remove("copied"); shaEl.innerHTML = prev; }, 1100);
      }
    });
    Array.prototype.forEach.call(body.querySelectorAll(".chip.parent"), function (el) {
      var sha = el.getAttribute("data-sha");
      if (!byId[sha]) return;
      el.addEventListener("click", function () { selectCommit(byId[sha]); scrollToCommit(byId[sha]); });
    });
  }

  // =====================================================================
  //  Search (dim non-matches)
  // =====================================================================
  function matchesQuery(c, q) {
    return (c.subject + " " + c.body + " " + c.author + " " + c.sha).toLowerCase().indexOf(q) >= 0;
  }
  var searchEl = document.getElementById("search");
  searchEl.addEventListener("input", function () {
    var q = searchEl.value.trim().toLowerCase();
    rowG.classed("dim", function (c) { return q ? !matchesQuery(c, q) : false; });
    edgeSel.style("opacity", function (d) {
      if (!q) return 1;
      return (matchesQuery(d.from, q) && matchesQuery(d.to, q)) ? 1 : 0.18;
    });
  });

  // =====================================================================
  //  Banner + meta
  // =====================================================================
  var meta = (typeof META !== "undefined") ? META : {};
  var note = document.getElementById("meta-note");
  note.innerHTML = '<span class="dot"></span>' + commits.length + " commit" + (commits.length === 1 ? "" : "s") +
    (meta.branch ? "  ·  " + escapeHtml(meta.branch) : "  ·  all branches");
  if (meta.total && meta.total > commits.length) {
    var banner = document.getElementById("banner");
    banner.style.display = "inline-flex";
    banner.textContent = "Showing " + commits.length.toLocaleString() + " of " + meta.total.toLocaleString() +
      " — re-run with --depth N for more.";
  }

  // ---- helpers ----
  function escapeHtml(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
  function truncStr(s, n) { s = s || ""; return s.length > n ? s.slice(0, n - 1) + "…" : s; }
  function truncateText(node, maxW) {
    if (node.getComputedTextLength() <= maxW) return;
    var t = node.textContent;
    while (t.length > 1 && node.getComputedTextLength() > maxW) {
      t = t.slice(0, -1);
      node.textContent = t + "…";
    }
  }
  function hexA(hex, a) {
    var h = hex.replace("#", "");
    if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
    var r = parseInt(h.slice(0, 2), 16), g = parseInt(h.slice(2, 4), 16), b = parseInt(h.slice(4, 6), 16);
    return "rgba(" + r + "," + g + "," + b + "," + a + ")";
  }
})();
</script>
</body>
</html>
